name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"] # O la rama que uses como principal
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          
      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: yarn install

      - name: Build with Next.js
        env:
          NEXT_OUTPUT_MODE: 'export'
          # Si tu repositorio no se llama "username.github.io" sino por ejemplo "mi-proyecto", 
          # necesitas configurar la ruta base en Next.js. Si esto te da problemas de estilos o enlaces rotos,
          # avísame para configurarlo en tu next.config.js
        run: yarn next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
